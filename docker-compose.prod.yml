services:
  mysql:
    image: mysql:8.0
    container_name: iot-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: iot_managerDeviceIoT
      MYSQL_USER: iot_managerIoT
      MYSQL_PASSWORD: iot_managerIoTpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - iot-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "iot_managerIoT", "-piot_managerIoTpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot-mosquitto
    restart: always
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - iot-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: iot-backend
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
      - MQTT_HOST=mosquitto
      - FRONTEND_URL=http://localhost
    depends_on:
      mysql:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - iot-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iot-frontend
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - iot-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: iot-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - iot-network
    restart: always

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  iot-network:
    driver: bridge
