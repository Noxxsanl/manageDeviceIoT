# Mosquitto MQTT Broker 2 - Gateway ↔ Backend layer
# Gateway Node publishes gateway/+/data here
# Backend subscribes gateway/+/data here
# Backend tracker reads $SYS/broker/log/N here for gateway IP tracking
listener 1883
allow_anonymous true

# Logging (log_dest topic enables $SYS/broker/log/N – needed by mqttTracker)
log_type all
log_dest stdout
log_dest topic

# Persistence
persistence true
persistence_location /mosquitto/data/
