; PlatformIO Project Configuration File – Gateway Node
; Target: ESP32 WROOM-32 (DOIT DevKit v1) — đổi từ ESP32-S3 do board S3 lỗi phần cứng
; (boot loop ngay trong bootloader gốc, đã loại trừ nguyên nhân code/config)

[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; ── Libraries ──────────────────────────────────────────────────────────────────
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.5

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -Wall
    -Iinclude
