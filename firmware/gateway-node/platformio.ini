; PlatformIO Project Configuration File – Gateway Node
; Board: ESP32-S3 N16R8 (16MB Flash, 8MB OPI PSRAM)

[env:esp32s3-n16r8]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; ESP32-S3 dùng USB CDC native – cần reset DTR/RTS để monitor không treo
monitor_rts = 0
monitor_dtr = 0

; ── Flash & PSRAM ──────────────────────────────────────────────────────────────
board_build.flash_size          = 16MB
board_build.flash_mode          = qio
board_build.partitions          = partitions_16MB.csv
; N16R8: QIO flash + OPI PSRAM (octal SPI interface)
board_build.arduino.memory_type = qio_opi

; ── Build flags ────────────────────────────────────────────────────────────────
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM
    ; USB CDC on boot: Serial → USB (không cần cáp UART riêng)
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; ── Libraries ──────────────────────────────────────────────────────────────────
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.5
